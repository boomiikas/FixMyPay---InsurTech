services:
  # MongoDB Database
  mongodb:
    image: mongo:6.0
    container_name: gigshield-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: gigshield
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./mongo-init.js/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - gigshield-network

  # Redis for caching and session management
  redis:
    image: redis:7-alpine
    container_name: gigshield-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - gigshield-network

  # Backend API Server
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gigshield-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://admin:password123@mongodb:27017/gigshield?authSource=admin
      REDIS_URL: redis://redis:6379
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
      JWT_EXPIRE: 7d
      # API Keys (replace with actual keys)
      WEATHER_API_KEY: ${WEATHER_API_KEY}
      POLLUTION_API_KEY: ${POLLUTION_API_KEY}
      TRAFFIC_API_KEY: ${TRAFFIC_API_KEY}
      # UPI Configuration
      UPI_MERCHANT_ID: ${UPI_MERCHANT_ID}
      UPI_API_KEY: ${UPI_API_KEY}
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
      - redis
    volumes:
      - ./logs:/app/logs
    networks:
      - gigshield-network
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:5000/api/health').then((res)=>process.exit(res.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend UI
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile.dev
    container_name: gigshield-frontend
    restart: unless-stopped
    environment:
      REACT_APP_API_URL: http://localhost:5000/api
      BROWSER: none
      REACT_APP_ENV: development
    ports:
      - "3001:3000"
    depends_on:
      - backend
    command: npm start

  # Nginx Reverse Proxy (Optional)
  nginx:
    image: nginx:alpine
    container_name: gigshield-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
    networks:
      - gigshield-network

volumes:
  mongodb_data:
    driver: local
  redis_data:
    driver: local
  frontend_node_modules:

networks:
  gigshield-network:
    driver: bridge
